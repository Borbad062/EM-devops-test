services:
  backend:
    build: ./backend
    container_name: backend_service
    networks:
      - app_network
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_service
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8000:80"
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # ro: read-only (только чтение)
    networks:
      - app_network

networks:
  app_network:
    driver: bridge